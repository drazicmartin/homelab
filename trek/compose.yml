services:
  nomad:
    image: mauriceboe/trek:${TREK_VERSION:-latest}
    container_name: trek
    environment:
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET:-}
      - PORT=3000
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
