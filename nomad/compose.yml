services:
  nomad:
    image: mauriceboe/nomad:${NOMAD_VERSION:-latest}
    container_name: nomad
    environment:
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET:-}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-}  # Optional: restrict CORS to specific origins
      - PORT=3000
      - FORCE_HTTPS=true
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
